version: 2
updates:
  # npm dependencies (root package.json)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5

  # GitHub Actions (workflows + composite actions under .github/actions/** are
  # scanned recursively from a single root directory entry)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
