name: Annual Cycle – Slack Notification

# Reusable workflow — call this from your own repository:
#
#   jobs:
#     notify:
#       uses: eliihen/annual-cycle/.github/workflows/notify-slack.yml@main
#       secrets:
#         slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
#
# See examples/workflows/notify-slack.yml for a complete example.

on:
  workflow_call:
    inputs:
      period:
        description: >
          Notification period: week, month, quarter, or all.
          Leave empty to auto-detect from the current date (weekly every run;
          monthly on first 7 days of month; quarterly on first 7 days of quarter).
        type: string
        required: false
        default: ''
      tasks_path:
        description: Path to the tasks folder in the calling repository
        type: string
        required: false
        default: tasks
      ref:
        description: annual-cycle tag, branch, or SHA to use
        type: string
        required: false
        default: main
    secrets:
      slack_webhook_url:
        description: Slack incoming webhook URL
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout calling repository (tasks source)
        uses: actions/checkout@v4
        with:
          path: consumer

      - name: Checkout annual-cycle (notify script)
        uses: actions/checkout@v4
        with:
          repository: eliihen/annual-cycle
          ref: ${{ inputs.ref }}
          path: annual-cycle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: annual-cycle/package-lock.json

      - name: Install dependencies
        working-directory: annual-cycle
        run: npm ci

      - name: Copy tasks into build tree
        run: cp -r consumer/${{ inputs.tasks_path }} annual-cycle/tasks

      - name: Send Slack notification
        working-directory: annual-cycle
        run: node src/notify.js
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
          NOTIFY_PERIOD: ${{ inputs.period }}
