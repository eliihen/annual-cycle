name: Annual Cycle – Build & Deploy

# Reusable workflow — call this from your own repository:
#
#   jobs:
#     deploy:
#       uses: eliihen/annual-cycle/.github/workflows/build-deploy.yml@main
#
# Your repo must grant: permissions: contents: read / pages: write / id-token: write
# See examples/workflows/deploy.yml for a complete example.
#
# This is a thin wrapper around build.yml + deploy.yml. If you only want the
# built static files (e.g. to host them yourself instead of GitHub Pages),
# call build.yml directly instead.

on:
  workflow_call:
    inputs:
      tasks_path:
        description: Path to the tasks folder in the calling repository
        type: string
        required: false
        default: tasks
      base_path:
        description: >
          URL base path for the built site (e.g. /my-repo/).
          Defaults to /<repo-name>/, which is correct for standard GitHub Pages URLs.
        type: string
        required: false
        default: ''
      site_url:
        description: >
          Full URL of the deployed site (e.g. https://myorg.github.io/my-repo/).
          Used as the link target in the embeddable iframe build.
          Defaults to https://<owner>.github.io/<repo-name>/.
        type: string
        required: false
        default: ''
      ref:
        description: annual-cycle tag, branch, or SHA to build from
        type: string
        required: false
        default: main

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      tasks_path: ${{ inputs.tasks_path }}
      base_path: ${{ inputs.base_path }}
      site_url: ${{ inputs.site_url }}
      ref: ${{ inputs.ref }}

  deploy:
    needs: build
    uses: ./.github/workflows/deploy.yml
