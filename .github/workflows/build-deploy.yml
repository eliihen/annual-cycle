name: Annual Cycle – Build & Deploy

# Reusable workflow — call this from your own repository:
#
#   jobs:
#     deploy:
#       uses: eliihen/annual-cycle/.github/workflows/build-deploy.yml@main
#
# Your repo must grant: permissions: contents: read / pages: write / id-token: write
# See examples/workflows/deploy.yml for a complete example.

on:
  workflow_call:
    inputs:
      tasks_path:
        description: Path to the tasks folder in the calling repository
        type: string
        required: false
        default: tasks
      base_path:
        description: >
          URL base path for the built site (e.g. /my-repo/).
          Defaults to /<repo-name>/, which is correct for standard GitHub Pages URLs.
        type: string
        required: false
        default: ''
      site_url:
        description: >
          Full URL of the deployed site (e.g. https://myorg.github.io/my-repo/).
          Used as the link target in the embeddable iframe build.
          Defaults to https://<owner>.github.io/<repo-name>/.
        type: string
        required: false
        default: ''
      ref:
        description: annual-cycle tag, branch, or SHA to build from
        type: string
        required: false
        default: main

concurrency:
  group: pages-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout calling repository (tasks source)
        uses: actions/checkout@v4
        with:
          path: consumer

      - name: Checkout annual-cycle (build tooling)
        uses: actions/checkout@v4
        with:
          repository: eliihen/annual-cycle
          ref: ${{ inputs.ref }}
          path: annual-cycle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: annual-cycle/package-lock.json

      - name: Install dependencies
        working-directory: annual-cycle
        run: npm ci

      - name: Copy tasks into build tree
        run: cp -r consumer/${{ inputs.tasks_path }} annual-cycle/tasks

      - name: Build
        working-directory: annual-cycle
        run: npm run build
        env:
          BASE_PATH: ${{ inputs.base_path || format('/{0}/', github.event.repository.name) }}
          IFRAME_LINK_TARGET: ${{ inputs.site_url || format('https://{0}.github.io/{1}/', github.repository_owner, github.event.repository.name) }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: annual-cycle/dist/
          overwrite: true

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
