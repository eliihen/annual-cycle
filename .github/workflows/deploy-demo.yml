name: Build & Deploy Årshjul

on:
  push:
    branches: [main]
    paths:
      - 'tasks/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build
        env:
          BASE_PATH: /annual-cycle/
          IFRAME_LINK_TARGET: https://eliihen.github.io/annual-cycle/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/
          overwrite: true

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
