name: Annual Cycle Slack Notification
description: >
  Sends a Slack digest of the Annual Cycle tasks active this week, month,
  and/or quarter.

inputs:
  slack_webhook_url:
    description: Slack incoming webhook URL
    required: true
  period:
    description: >
      Notification period: week, month, quarter, or all.
      Leave empty to auto-detect from the current date (weekly every run;
      monthly on first 7 days of month; quarterly on first 7 days of quarter).
    required: false
    default: ''
  tasks_path:
    description: Path to the tasks folder in the calling repository
    required: false
    default: tasks
  ref:
    description: annual-cycle tag, branch, or SHA to use
    required: false
    default: main

runs:
  using: composite
  steps:
    - name: Checkout annual-cycle (notify script)
      uses: actions/checkout@v4
      with:
        repository: eliihen/annual-cycle
        ref: ${{ inputs.ref }}
        path: annual-cycle-src

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: annual-cycle-src/package-lock.json

    - name: Install dependencies
      working-directory: annual-cycle-src
      shell: bash
      run: npm ci

    - name: Copy tasks into build tree
      shell: bash
      run: cp -r "${{ inputs.tasks_path }}" annual-cycle-src/tasks

    - name: Send Slack notification
      working-directory: annual-cycle-src
      shell: bash
      run: node src/notify.js
      env:
        SLACK_WEBHOOK_URL: ${{ inputs.slack_webhook_url }}
        NOTIFY_PERIOD: ${{ inputs.period }}
