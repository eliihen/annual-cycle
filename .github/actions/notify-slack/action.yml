name: Annual Cycle Slack Notification
description: >
  Sends a Slack digest of the Annual Cycle tasks active this week, month,
  and/or quarter.

inputs:
  slack_webhook_url:
    description: Slack incoming webhook URL
    required: true
  period:
    description: >
      Notification period: week, month, quarter, or all.
      Leave empty to auto-detect from the current date (weekly every run;
      monthly on first 7 days of month; quarterly on first 7 days of quarter).
    required: false
    default: ''
  tasks_path:
    description: Path to the tasks folder in the calling repository
    required: false
    default: tasks
  ref:
    description: >
      Deprecated, no-op. This is now a JavaScript action, so the annual-cycle
      version used is pinned by the @ref in this action's own `uses:`
      reference (e.g. eliihen/annual-cycle/.github/actions/notify-slack@v2).
      Kept only for backward compatibility with existing callers — setting it
      has no effect.
    required: false
    default: main

runs:
  using: node20
  main: dist/index.js
