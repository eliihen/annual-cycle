# Copy this file to .github/workflows/build.yml in your repository if you
# want to self-host the built site (e.g. Netlify, S3, an internal server)
# instead of deploying to GitHub Pages.
#
# The build action is just a step, so it intermingles with whatever other
# steps you need — add a deploy-elsewhere step right after it in the same job.

name: Build Annual Cycle

on:
  push:
    branches: [main]
    paths:
      - 'tasks/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Annual Cycle
        id: build
        uses: eliihen/annual-cycle/.github/actions/build@v1
        # Optional overrides — see build-deploy's inputs for details.
        #
        # with:
        #   base_path: /
        #   site_url: https://example.com/
        #   tasks_path: tasks

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: annual-cycle-dist
          path: ${{ steps.build.outputs.dist_path }}

      # Or skip the artifact and deploy straight from this job, e.g.:
      # - name: Sync to S3
      #   run: aws s3 sync ${{ steps.build.outputs.dist_path }} s3://my-bucket/ --delete
