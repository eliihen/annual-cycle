# Copy this file to .github/workflows/deploy.yml in your repository.
#
# Before the first deploy:
#   1. Go to Settings → Pages in your repository
#   2. Set Source to "GitHub Actions"
#
# The site will then be live at https://<you>.github.io/<your-repo>/
# after the first successful run.

name: Deploy Annual Cycle

on:
  push:
    branches: [main]
    paths:
      - 'tasks/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:        # also allows manual runs from the Actions tab

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.build-deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & deploy Annual Cycle
        id: build-deploy
        uses: eliihen/annual-cycle/.github/actions/build-deploy@v1
        # Optional overrides — the action auto-detects correct values for standard
        # GitHub Pages setups, so you only need these if you use a custom domain or
        # a non-default tasks directory.
        #
        # with:
        #   base_path: /        # set to / when using a custom domain
        #   site_url: https://example.com/
        #   tasks_path: tasks

      # Add any of your own steps here too — composite actions are just
      # another step, so they intermingle freely with the rest of your job.
